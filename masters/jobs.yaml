    emoji: 🏹
    color: "#40c060"
    desc: 高い移動力と遠距離攻撃を持つスナイパー。罠や奇襲が得意。
    side_jobs: [fighter, black]
    advanced_job: ninja
    equipment:
      weapons: [短剣, 弓, 銃, ボウガン]
      armor: [軽鎧(上), 軽鎧(下), 軽兜, 軽篭手, 軽ブーツ]
