# ジョブ定義マスター
# 全12ジョブのステータスと基本情報
# 上位ジョブの解放条件: Lv45 + ドラゴニアメインクエスト第1話相当

jobs:

  # ==============================
  # 基本ジョブ (6種)
  # ==============================

  warrior:
    id: warrior
    name: 戦士
    tier: base
    emoji: ⚔️
    color: "#e05050"
    desc: 重装備の近距離戦士。高い防御力と多様な武器を使いこなす。
    side_jobs: [thief, fighter]
    advanced_job: knight
    equipment:
      weapons: [片手剣, 両手剣, 片手斧, 両手斧, 棍棒, 刀, 槍, ポールウェポン]
      armor: [重鎧(上), 重鎧(下), 重兜, 重篭手, ブーツ, 盾]
    stats:
      hp_max: 120
      ap_max: 100
      attack: 80
      defense: 40
      magic_defense: 20
      hit_rate: 80
      evade_rate: 30
      speed: 40
      movement: 3
      cup: 1   # 登れる段差上限
      cdn: 2   # 降りられる段差上限

  fighter:
    id: fighter
    name: 格闘士
    tier: base
    emoji: 👊
    color: "#e07030"
    desc: 素手による格闘技の達人。高い攻撃力と機動性を誇る。
    side_jobs: [warrior, guardian]
    advanced_job: illusionary_fighter
    equipment:
      weapons: [格闘]
      armor: [道衣(上), 道衣(下), 鉢巻, 拳帯, 格闘ブーツ]
