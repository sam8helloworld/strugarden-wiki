    type: 帽子
    weight: heavy
    defense: 12
    magic_defense: 38
    jobs: [guardian, dimensional_archon, spirit, summoning_celestial_guide, black, alchemic_grand_sage]

  # ===== 腕部 =====

  ## 篭手 (戦士系)
  - id: light_gauntlet
    name: ライトガントレット
    slot: 腕
    type: 篭手
    weight: light
    defense: 10
    jobs: [warrior, knight, fighter, illusionary_fighter, thief, ninja]

  - id: iron_gauntlet
    name: アイアンガントレット
    slot: 腕
    type: 篭手
    weight: medium
    defense: 18
    jobs: [warrior, knight]

  - id: heavy_gauntlet
