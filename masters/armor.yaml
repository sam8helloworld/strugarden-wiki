# 防具マスター
# 部位: 頭(兜/帽子)/腕(篭手/手袋)/胴上(鎧上/服/ローブ)/胴下(鎧下/ローブ)/脚(ブーツ)/盾
# 重量: 軽/中/重 (重いほど移動量・スピードが低下)
# 重量別移動量目安: 軽=5歩, 中=4歩, 重=3歩

armor:

  # ===== 頭部 =====

  ## 兜 (戦士系)
  - id: light_helm
    name: ライトヘルム
    slot: 頭
    type: 兜
    weight: light
    defense: 12
    jobs: [warrior, knight, fighter, illusionary_fighter]

  - id: iron_helm
    name: アイアンヘルム
    slot: 頭
    type: 兜
    weight: medium
    defense: 22
    jobs: [warrior, knight]

  - id: great_helm
    name: グレートヘルム
    slot: 頭
    type: 兜
    weight: heavy
    defense: 35
    jobs: [warrior, knight]

  ## 帽子 (魔法系)
  - id: cloth_hat
    name: クロスハット
    slot: 頭
    type: 帽子
    weight: light
    defense: 5
    magic_defense: 15
    jobs: [guardian, dimensional_archon, spirit, summoning_celestial_guide, black, alchemic_grand_sage, thief, ninja]

  - id: mage_hat
    name: メイジハット
    slot: 頭
    type: 帽子
    weight: medium
    defense: 8
