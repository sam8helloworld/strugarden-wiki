<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ストラガーデン PvP</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">

<!-- SETUP -->
<div id="s-setup" class="screen active">
  <h1>⚔️ ストラガーデン PvP</h1>
  <p class="subtitle">Phase 1 MVP — 1v1 デュエル</p>
  <div class="mode-row">
    <button class="mode-btn on" data-m="ai">🤖 vs AI</button>
    <button class="mode-btn" data-m="pvp">👥 ローカル対戦</button>
  </div>
  <div class="players-wrap">
    <div class="player-panel" data-pl="p1">
      <h2 class="p1h">⚔️ プレイヤー1</h2>
      <div class="job-grid" id="p1-jobs"></div>
      <div class="skill-pick">
        <h3>デッキ (3枚選択)</h3>
        <div class="sk-list" id="p1-skills"></div>
      </div>
      <div class="deck-info">選択: <span id="p1-cnt">0</span>/3</div>
    </div>
    <div class="player-panel" id="p2-panel" data-pl="p2" style="opacity:.55;pointer-events:none">
      <h2 class="p2h">🤖 プレイヤー2 (AI)</h2>
      <div class="job-grid" id="p2-jobs"></div>
      <div class="skill-pick">
        <h3>デッキ (3枚選択)</h3>
        <div class="sk-list" id="p2-skills"></div>
      </div>
      <div class="deck-info">選択: <span id="p2-cnt">0</span>/3</div>
    </div>
  </div>
  <button id="btn-start" disabled>⚔️ バトル開始</button>
</div>

<!-- PASS -->
<div id="s-pass" class="screen">
  <h2 id="pass-who"></h2>
  <p id="pass-msg"></p>
  <button id="btn-pass">準備完了 →</button>
</div>

<!-- BATTLE -->
<div id="s-battle" class="screen">
  <div id="b-hdr">
    <span id="b-turn">ターン 1</span>
    <span id="b-phase"><span>開始</span></span>
    <span id="mv-budget" style="margin-left:auto;font-size:.8rem;color:#aaa"></span>
  </div>
  <div id="b-side">
    <div class="u-hud" id="hud-p1" data-uid="p1">
      <div class="hud-head">
        <span class="hud-emoji" id="em-p1">⚔️</span>
        <div>
          <div class="hud-name p1h" id="nm-p1">P1</div>
          <div class="hud-job" id="dk-p1"></div>
        </div>
      </div>
      <div class="bar-r">
        <div class="bar-lbl"><span>HP</span><span id="hp-p1">-</span></div>
        <div class="bar-bg"><div class="bar-hp" id="bh-p1" style="width:100%"></div></div>
      </div>
      <div class="bar-r">
        <div class="bar-lbl"><span>AP</span><span id="ap-p1">-</span></div>
        <div class="bar-bg"><div class="bar-ap" id="ba-p1" style="width:100%"></div></div>
      </div>
      <div class="facing-row">向き: <span id="fc-p1">↑</span></div>
      <div class="badges" id="bd-p1"></div>
    </div>
    <div class="u-hud" id="hud-p2" data-uid="p2">
      <div class="hud-head">
        <span class="hud-emoji" id="em-p2">🤖</span>
        <div>
          <div class="hud-name p2h" id="nm-p2">P2</div>
          <div class="hud-job" id="dk-p2"></div>
        </div>
      </div>
      <div class="bar-r">
        <div class="bar-lbl"><span>HP</span><span id="hp-p2">-</span></div>
        <div class="bar-bg"><div class="bar-hp" id="bh-p2" style="width:100%"></div></div>
      </div>
      <div class="bar-r">
        <div class="bar-lbl"><span>AP</span><span id="ap-p2">-</span></div>
        <div class="bar-bg"><div class="bar-ap" id="ba-p2" style="width:100%"></div></div>
      </div>
      <div class="facing-row">向き: <span id="fc-p2">↓</span></div>
      <div class="badges" id="bd-p2"></div>
    </div>
    <div id="b-log"></div>
  </div>
  <div id="b-grid">
    <div id="grid-wrap">
      <div id="grid-cells"></div>
    </div>
  </div>
  <div id="b-act">
    <div id="act-title">準備中...</div>
    <div id="act-btns"></div>
    <div id="act-hint"></div>
  </div>
</div>

<!-- RESULT -->
<div id="s-result" class="screen">
  <div id="res-title"></div>
  <div id="res-sub"></div>
  <button id="btn-rematch">もう一度</button>
</div>

</div><!-- #app -->
<script src="js/master.js"></script>
<script src="js/engine.js"></script>
<script src="js/ai.js"></script>
<script src="js/main.js"></script>
</body>
</html>
